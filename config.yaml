# LLMBase Configuration
# LLM provider is configured via .env file:
#   LLMBASE_API_KEY, LLMBASE_BASE_URL, LLMBASE_MODEL
# See .env.example for setup instructions.

llm:
  max_tokens: 16384

paths:
  raw: "./raw"
  wiki: "./wiki"
  outputs: "./wiki/outputs"
  meta: "./wiki/_meta"
  concepts: "./wiki/concepts"

compile:
  batch_size: 10
  backlinks: true

# Web server
# web:
#   static_dir: "./my-frontend/dist"  # Custom frontend path (default: static/dist)

search:
  port: 5555

# Source API
# sources:
#   max_content_chars: 50000          # Content cap for /api/sources/<slug> (max 500K)

lint:
  web_search: false

worker:
  enabled: false
  learn_interval_hours: 6
  compile_interval_hours: 1
  taxonomy_interval_hours: 12
  health_check_interval_hours: 24
  learn_batch_size: 10
  learn_source: cbeta

health:
  auto_fix_broken_links: true
  max_stubs_per_run: 10

entities:
  enabled: false
  extract_interval_hours: 24
